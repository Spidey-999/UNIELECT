<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Secure and anonymous student election voting platform" />
    <meta name="keywords" content="student election, voting, democracy, campus" />
    <meta name="author" content="Student Election System" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Student Election Voting" />
    <meta property="og:description" content="Secure and anonymous student election voting platform" />
    <meta property="og:image" content="/og-image.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Student Election Voting" />
    <meta property="twitter:description" content="Secure and anonymous student election voting platform" />
    <meta property="twitter:image" content="/og-image.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#4f46e5" />
    
    <!-- Manifest for PWA -->
    <link rel="manifest" href="/manifest.json" />
    
    <title>Student Election Voting - Secure Campus Elections</title>
  </head>
  <body>
    <!-- Skip to main content for accessibility -->
    <a href="#main" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-primary-600 text-white px-4 py-2 rounded">
      Skip to main content
    </a>
    
    <div id="root" role="main" id="main">
      <!-- Loading fallback -->
      <div class="flex items-center justify-center min-h-screen bg-gray-50">
        <div class="text-center">
          <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary-600 mx-auto mb-4"></div>
          <p class="text-gray-600">Loading Student Election System...</p>
        </div>
      </div>
    </div>
    
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- No-JS fallback -->
    <noscript>
      <div class="flex items-center justify-center min-h-screen bg-gray-50">
        <div class="text-center p-8 max-w-md">
          <h1 class="text-2xl font-bold text-gray-900 mb-4">JavaScript Required</h1>
          <p class="text-gray-600 mb-6">
            The Student Election Voting System requires JavaScript to function properly.
            Please enable JavaScript in your browser settings and refresh the page.
          </p>
          <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4">
            <p class="text-sm text-yellow-800">
              <strong>Why JavaScript?</strong><br>
              JavaScript is required for secure voting, real-time updates, and interactive features that ensure a smooth voting experience.
            </p>
          </div>
        </div>
      </div>
    </noscript>
  </body>
</html>
